  <link id="lms-custom-style" rel="stylesheet" href="%PUBLIC_URL%/assets/css/style.min.css" />

  <!-- Global font override: Barlow -->
  <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/fonts-barlow.css" />

  <script>
    (function() {
      var path = window.location.pathname;
      var saLandPaths = [
        "/",
        "/online-skill-development-courses-india",
        "/register",
        "/best-digital-marketing-course-online-india-with-certificate",
        "/best-graphic-design-course-online-india-with-certificate",
        "/best-video-editing-course-online-india-with-certificate",
        "/get-in-touch-ed-vedha",
        "/youtube-contact",
        "/privacy-policy",
        "/refund-policy",
        "/return-policy",
        "/cancellation-policy",
        "/terms-conditions",
        "/payment-result",
        "/book-demo",
        "/calendly-demo"
      ];
      var isSaLand = saLandPaths.indexOf(path) !== -1 || path.indexOf("/course/") === 0 || (path === "/courses" && !localStorage.getItem("jwt"));
      
      var saLandCss = document.getElementById("sa-land-style");
      var lmsBootstrap = document.getElementById("lms-bootstrap-style");
      var lmsCustom = document.getElementById("lms-custom-style");
      var lmsOverride = document.getElementById("lms-override-style");

      if (isSaLand) {
        if (lmsBootstrap) lmsBootstrap.disabled = true;
        if (lmsCustom) lmsCustom.disabled = true;
        if (lmsOverride) lmsOverride.disabled = true;
        if (saLandCss) saLandCss.disabled = false;
      } else {
        if (saLandCss) saLandCss.disabled = true;
        if (lmsBootstrap) lmsBootstrap.disabled = false;
        if (lmsCustom) lmsCustom.disabled = false;
        if (lmsOverride) lmsOverride.disabled = false;
      }
    })();
  </script>
